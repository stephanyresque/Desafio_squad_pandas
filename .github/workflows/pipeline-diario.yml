name: pipeline diario

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  ingestao:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependencias
        run: pip install -r pipeline/requirements.txt

      - name: Ingestao da janela movel (verificada + programada) — 4 subsistemas
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for cod in SECO S NE N; do
            echo "== Ingerindo $cod =="
            python pipeline/ingest_verificada.py --codigo "$cod"
            python pipeline/ingest_programada.py --codigo "$cod"
          done