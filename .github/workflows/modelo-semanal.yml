name: modelo semanal

on:
  schedule:
    - cron: "0 13 * * 3"
  workflow_dispatch:

jobs:
  retreino:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instala dependencias
        run: pip install -r pipeline/requirements.txt

      - name: Teste retroativo + Ridge servido — 4 subsistemas
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for cod in SECO S NE N; do
            echo "== Modelo $cod =="
            python -m src.model --codigo "$cod"
          done
        working-directory: pipeline